version: 2
updates:
- package-ecosystem: maven
  groups:
    fiks-deps:
      patterns:
      - "no.ks.fiks*"
      update-types:
      - "minor"
      - "patch"
    other-deps:
      patterns:
      - "*"
      exclude-patterns:
      - "no.ks.fiks*"
      update-types:
      - "minor"
      - "patch"
  directory: "/"
  schedule:
    interval: daily
    time: "05:05"
    timezone: Europe/Oslo
  open-pull-requests-limit: 15
